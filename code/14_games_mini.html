<script>
(function() {
  const canvas = document.getElementById('shader-canvas-ANIMATION_8');

  // Sync the WebGL drawing-buffer size with the CSS-driven layout size.
  // This fires on initial layout and whenever the element is resized.
  function syncSize() {
    const w = canvas.clientWidth  || 1280;
    const h = canvas.clientHeight || 720;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width  = w;
      canvas.height = h;
    }
  }
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(syncSize).observe(canvas);
  }
  syncSize();

  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  const vs = `attribute vec2 a_position;
varying vec2 v_texCoord;
void main() {
  v_texCoord = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;
  const fs = `precision highp float;
varying vec2 v_texCoord;
uniform float u_time;
uniform vec2 u_resolution;

float rand(vec2 co) {
    return fract(sin(dot(co.xy ,vec2(12.9898,78.233))) * 43758.5453);
}

void main() {
    vec2 uv = v_texCoord;
    
    // Glitch effect logic - subtle horizontal shifts
    float jitter = step(0.98, rand(vec2(u_time * 0.2, floor(uv.y * 50.0)))) * 0.005 * sin(u_time * 20.0);
    uv.x += jitter;
    
    // Scanlines
    float scanline = sin(uv.y * u_resolution.y * 1.2) * 0.06;
    
    // Pulsating Blood Vignette
    float dist = distance(uv, vec2(0.5));
    float pulse = 0.5 + 0.5 * sin(u_time * 0.8);
    float vignette = smoothstep(0.9 - (pulse * 0.05), 0.4, dist);
    
    // Base color (Black)
    vec3 color = vec3(0.0);
    
    // Red atmosphere/noise
    float noise = rand(uv + u_time * 0.01) * 0.04;
    vec3 redTint = vec3(0.1, 0.0, 0.0) * pulse;
    color += redTint + noise;
    
    // Combine scanlines and vignette
    color -= scanline;
    color *= vignette;
    
    // Chromatic Aberration - subtle red/blue split on the edges
    float r = texture2D(u_resolution.xy > 0.0 ? vec2(0.0) : uv, uv + vec2(0.002, 0.0)).r; // Placeholder logic for color shift
    
    gl_FragColor = vec4(color, 1.0);
}`;
  function cs(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog);
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const pos = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes = gl.getUniformLocation(prog, 'u_resolution');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');

  // u_mouse is in pixel coordinates matching u_resolution (ShaderToy convention).
  // Shaders that need normalized coords should use: u_mouse / u_resolution.
  let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
  window.addEventListener('mousemove', (event) => {
    const rect = canvas.getBoundingClientRect();
    if (rect.width && rect.height) {
      const nx = (event.clientX - rect.left) / rect.width;
      const ny = 1.0 - (event.clientY - rect.top) / rect.height;
      mouse.x = nx * canvas.width;
      mouse.y = ny * canvas.height;
    }
  });

  function render(t) {
    if (typeof ResizeObserver === 'undefined') syncSize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    if (uTime) gl.uniform1f(uTime, t * 0.001);
    if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
    if (uMouse) gl.uniform2f(uMouse, mouse.x, mouse.y);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  render(0);
})();

<script>
        const questions = [
            {
                q: "JIKA 100 - 32 = ?",
                a: ["58", "68", "78"],
                correct: 1
            },
            {
                q: "JIKA KAU MELIHAT 3 MATA DI JENDELA, DAN 4 MATA DI PINTU, BERAPA BANYAK YANG MEMERHATIKAN KAU?",
                a: ["0 MATA", "7 MATA", "TIADA SESIAPA"],
                correct: 1
            },
            {
                q: "JIKA AKU BERJALAN 152 METER KE RUMAH KAU, DAN BERATKU 41 KG, BERAPA BANYAK TENAGA UNTUK BUKA PINTU BILIK KAU?",
                a: ["41 JOULE", "152 JOULE", "TIADA LIMIT"],
                correct: 2
            },
            {
                q: "JIKA 20 MAC 2010 ADALAH TARIKH LAHIRKU, BERAPA KALI AKU SUDAH BERMIMPI TENTANG KAU?",
                a: ["16 KALI", "SETIAP MALAM", "KOSONG"],
                correct: 1
            },
            {
                q: "JIKA KAU LARI, DAN JALAN PUTRA ADA DI BELAKANG KAU, BERAPA LAMA KAU BOLEH HIDUP?",
                a: ["0 SAAT", "1 SAAT", "1 JAM"],
                correct: 0
            }
        ];

        let currentQuestionIndex = 0;

        function loadQuestion() {
            const q = questions[currentQuestionIndex];
            const quizArea = document.getElementById('quiz-area');
            
            quizArea.innerHTML = `
                <div class="font-label-mono text-label-mono text-inverse-surface bg-surface-container-high px-6 py-4 w-full text-center tracking-widest border-l-2 border-primary-container shadow-[inset_0_0_10px_rgba(0,0,0,0.8)] uppercase">
                    ${q.q}
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 w-full">
                    ${q.a.map((ans, idx) => `
                        <button class="game-btn font-label-mono text-label-mono text-on-surface bg-surface border border-[#393939] py-3 hover:border-primary-container hover:bg-primary-container/10 hover:text-primary transition-colors uppercase relative overflow-hidden group cursor-pointer" onclick="handleAnswer(this, ${idx === q.correct})">
                            <span class="relative z-10 group-hover:glitch-hover">${ans}</span>
                        </button>
                    `).join('')}
                </div>
            `;
            
            // Adjust intensity of glitch overlay
            const scanlines = document.querySelector('.scanlines');
            if (scanlines) {
                scanlines.style.opacity = (currentQuestionIndex * 0.18 + 0.1).toString();
            }
        }

        function handleAnswer(btn, isCorrect) {
            const container = document.getElementById('game-container');
            const buttons = document.querySelectorAll('.game-btn');
            
            buttons.forEach(b => b.disabled = true);

            if (isCorrect) {
                createBloodSplatter(btn);
                btn.classList.add('bg-primary-container', 'text-on-primary-container');
                setTimeout(() => {
                    btn.classList.remove('bg-primary-container', 'text-on-primary-container');
                    
                    currentQuestionIndex++;
                    if (currentQuestionIndex < questions.length) {
                        loadQuestion();
                    } else {
                        showWinState();
                    }
                }, 1000);
            } else {
                container.classList.add('violent-shake');
                document.body.style.filter = "invert(20%) sepia(1) saturate(5)";
                
                setTimeout(() => {
                    container.classList.remove('violent-shake');
                    document.body.style.filter = "none";
                    buttons.forEach(b => b.disabled = false);
                }, 400);
            }
        }

        function showWinState() {
            const gameContainer = document.getElementById('game-container');
            document.body.style.filter = "invert(100%)";
            setTimeout(() => {
                document.body.style.filter = "none";
                document.body.style.backgroundColor = "#000";
                
                const img = gameContainer.querySelector('img');
                if (img) {
                    img.style.filter = "grayscale(100%) brightness(1.3) contrast(300%)";
                }
                
                gameContainer.innerHTML = `

                        TAPI KAU TAKKAN LEPAS DARIPADA AKU.<br/>

                        AKU TUNGGU KAU DATANG...
                    </div>
                    <button onclick="window.location.href='./05_dunia_gelap_utama.html'" class="game-btn font-label-mono text-label-mono text-[#F5F5F5] bg-error-container border border-error py-3 px-6 hover:bg-error transition-colors uppercase relative overflow-hidden mt-4 w-full cursor-pointer">
                        KEMBALI KE OBSERVATION
                    </button>
                `;

        function createBloodSplatter(element) {
            const rect = element.getBoundingClientRect();
            const container = document.body;

            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.classList.add('blood-particle');
                
                const size = Math.random() * 8 + 2;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                
                const startX = rect.left + rect.width / 2;
                const startY = rect.top + rect.height / 2;
                
                particle.style.left = `${startX}px`;
                particle.style.top = `${startY}px`;
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 100 + 50;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;
                
                particle.style.setProperty('--tx', `${tx}px`);
                particle.style.setProperty('--ty', `${ty}px`);
                
                container.appendChild(particle);
                
                setTimeout(() => {
                    particle.remove();
                }, 600);
            }
        }

        window.addEventListener('DOMContentLoaded', loadQuestion);
    </script>
</body></html>
