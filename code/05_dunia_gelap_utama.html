        body {

        /* Vignette and CRT overlay */
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;

            background: radial-gradient(circle, transparent 20%, #000000 90%);

            background: linear-gradient(

                rgba(255, 255, 255, 0),

                rgba(0, 0, 0, 0.2) 50%,
                rgba(0, 0, 0, 0.2)
            );
            background-size: 100% 4px;
            z-index: 11;
            opacity: 0.3;
        }

        /* Glitch Animation */
        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }
        .glitch-hover:hover {
            animation: glitch 0.2s infinite;
        }

        /* Flicker Animation */
        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
            20%, 22%, 24%, 55% { opacity: 0.8; }
        }
        .flicker {
            animation: flicker 4s infinite;
        }

        /* Tremble Animation */
        @keyframes tremble {
            0% { transform: translateX(0); }
            25% { transform: translateX(-1px) rotate(-1deg); }
            50% { transform: translateX(1px) rotate(1deg); }
            75% { transform: translateX(-1px) rotate(0deg); }
            100% { transform: translateX(0); }
        }
        .tremble:hover {
            animation: tremble 0.1s infinite;
        }

        /* Pulse Animation */
        @keyframes heartbeat {
            0% { transform: scale(1); }
            25% { transform: scale(1.05); }
            50% { transform: scale(1); }
            75% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        .pulse-heartbeat {
            animation: heartbeat 1.5s infinite;

<canvas id="shader-canvas-ANIMATION_8" style="display:block;width:100%;height:100%"></canvas>
<script>
(function() {
  const canvas = document.getElementById('shader-canvas-ANIMATION_8');

  // Sync the WebGL drawing-buffer size with the CSS-driven layout size.
  // This fires on initial layout and whenever the element is resized.
  function syncSize() {
    const w = canvas.clientWidth  || 1280;
    const h = canvas.clientHeight || 720;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width  = w;
      canvas.height = h;
    }
  }
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(syncSize).observe(canvas);
  }
  syncSize();

  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  const vs = `attribute vec2 a_position;
varying vec2 v_texCoord;
void main() {
  v_texCoord = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;
  const fs = `precision highp float;
varying vec2 v_texCoord;
uniform float u_time;
uniform vec2 u_resolution;

float rand(vec2 co) {
    return fract(sin(dot(co.xy ,vec2(12.9898,78.233))) * 43758.5453);
}

void main() {
    vec2 uv = v_texCoord;
    
    // Glitch effect logic - subtle horizontal shifts
    float jitter = step(0.98, rand(vec2(u_time * 0.2, floor(uv.y * 50.0)))) * 0.005 * sin(u_time * 20.0);
    uv.x += jitter;
    
    // Scanlines
    float scanline = sin(uv.y * u_resolution.y * 1.2) * 0.06;
    
    // Pulsating Blood Vignette
    float dist = distance(uv, vec2(0.5));
    float pulse = 0.5 + 0.5 * sin(u_time * 0.8);
    float vignette = smoothstep(0.9 - (pulse * 0.05), 0.4, dist);
    
    // Base color (Black)
    vec3 color = vec3(0.0);
    
    // Red atmosphere/noise
    float noise = rand(uv + u_time * 0.01) * 0.04;
    vec3 redTint = vec3(0.1, 0.0, 0.0) * pulse;
    color += redTint + noise;
    
    // Combine scanlines and vignette
    color -= scanline;
    color *= vignette;
    
    // Chromatic Aberration - subtle red/blue split on the edges
    float r = texture2D(u_resolution.xy > 0.0 ? vec2(0.0) : uv, uv + vec2(0.002, 0.0)).r; // Placeholder logic for color shift
    
    gl_FragColor = vec4(color, 1.0);
}`;
  function cs(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog);
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const pos = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes = gl.getUniformLocation(prog, 'u_resolution');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');

  // u_mouse is in pixel coordinates matching u_resolution (ShaderToy convention).
  // Shaders that need normalized coords should use: u_mouse / u_resolution.
  let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
  window.addEventListener('mousemove', (event) => {
    const rect = canvas.getBoundingClientRect();
    if (rect.width && rect.height) {
      const nx = (event.clientX - rect.left) / rect.width;
      const ny = 1.0 - (event.clientY - rect.top) / rect.height;
      mouse.x = nx * canvas.width;
      mouse.y = ny * canvas.height;
    }
  });

  function render(t) {
    if (typeof ResizeObserver === 'undefined') syncSize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    if (uTime) gl.uniform1f(uTime, t * 0.001);
    if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
    if (uMouse) gl.uniform2f(uMouse, mouse.x, mouse.y);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  render(0);
})();
</script>
